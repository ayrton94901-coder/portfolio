<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>新規登録</title>

	<!-- Bootstrap CDN -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- 自作CSS -->
	<link rel="stylesheet" th:href="@{/app.css}">
</head>

<body>
	<!-- 認証用ヘッダー（ロゴだけ） -->
	<div th:replace="~{fragments/header :: authHeader}"></div>

	<div class="container py-3" style="max-width: 520px;">
		<h1 class="h3 mb-3">新規登録</h1>

		<form th:action="@{/signup}" th:object="${signupForm}" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

			<div class="mb-3">
				<label class="form-label">メールアドレス</label>
				<input class="form-control" type="text" th:field="*{email}">
				<div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
			</div>

			<div class="mb-3">
				<label class="form-label">パスワード</label>
				<input class="form-control" type="password" th:field="*{password}">
				<div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
				</div>
			</div>

			<div class="mb-3">
				<label class="form-label">ユーザー名（@の後ろ）</label>
				<div class="input-group">
					<span class="input-group-text">@</span>
					<input class="form-control" type="text" th:field="*{handle}" placeholder="例: ayrton94901">
				</div>
				<div class="text-danger small mt-1" th:if="${#fields.hasErrors('handle')}" th:errors="*{handle}"></div>
			</div>

			<div class="mb-3">
				<label class="form-label">表示名</label>
				<input class="form-control" type="text" th:field="*{displayName}" placeholder="例: ゆうじ">
				<div class="text-danger small mt-1" th:if="${#fields.hasErrors('displayName')}"
					th:errors="*{displayName}"></div>
			</div>

			<button class="btn btn-primary w-100" type="submit">登録</button>
		</form>

		<div class="mt-3">
			<a th:href="@{/login}">ログインへ</a>
		</div>
	</div>
</body>

</html>
