<div xmlns:th="http://www.thymeleaf.org"
     th:fragment="postCard(p, showDate)"
     class="feed-card"
     th:if="${p != null}">

  <div class="feed-header">
    <div class="user-mini">

      <!-- avatar：2つのimg分岐（これはOK） -->
      <img class="avatar"
           th:if="${p.user != null and p.user.avatarFilename != null}"
           th:src="@{'/uploads/' + ${p.user.avatarFilename}}"
           alt="avatar">

      <img class="avatar"
           th:if="${p.user == null or p.user.avatarFilename == null}"
           th:src="@{/default-avatar.png}"
           alt="avatar">

        <div class="user-lines" th:if="${p.user != null}">
  <a class="user-name profile-link"
     th:href="@{/users/{id}(id=${p.user.id})}"
     th:text="${p.user.displayName}">
    user
  </a>

  <a class="user-handle profile-link"
     th:href="@{/users/{id}(id=${p.user.id})}"
     th:text="'@' + ${p.user.handle}">
    @user
  </a>
</div>

<div class="user-lines" th:if="${p.user == null}">
  <div class="user-name">unknown</div>
  <div class="user-handle">@unknown</div>
</div>
      </div>

      <!-- 日付だけ切り替える -->
      <div class="post-date"
           th:if="${showDate}"
           th:text="${#temporals.format(p.createdAt, 'yyyy/MM/dd')}">2026/03/30</div>
    </div>

    <!-- 画像/カードクリックで詳細へ -->
    <div class="card-link"
         role="link"
         tabindex="0"
         th:data-href="@{/posts/{id}(id=${p.id})}">
      <div class="media">
        <img th:src="@{'/uploads/' + ${p.imageFilename}}" alt="image">
        <div class="media-title">
          <p class="title" th:text="${p.movieTitle}">映画タイトル</p>
          <p class="subtitle"
             th:text="${p.director + ' / ' + p.releaseYear}">監督 / 年</p>
        </div>
      </div>
    </div>

    <p class="feed-caption"
       th:text="${p.caption}"
       style="margin:12px 0 0; color:#374151;">
      感想本文
    </p>

    <div class="rating-row" th:if="${p.rating != null}">
      <div class="stars" aria-label="rating">
        <span class="star" th:classappend="${p.rating >= 1} ? ' is-on' : ''">★</span>
        <span class="star" th:classappend="${p.rating >= 2} ? ' is-on' : ''">★</span>
        <span class="star" th:classappend="${p.rating >= 3} ? ' is-on' : ''">★</span>
        <span class="star" th:classappend="${p.rating >= 4} ? ' is-on' : ''">★</span>
        <span class="star" th:classappend="${p.rating >= 5} ? ' is-on' : ''">★</span>
      </div>
      <div class="rating-num" th:text="${p.rating} + '.0'">5.0</div>
    </div>

    <div class="chips" th:if="${p.tags != null}" style="margin-top:10px;">
      <a class="chip"
         th:each="t : ${p.tags}"
         th:href="@{/posts(tag=${t.name})}"
         th:text="'#' + ${t.name}">
        #tag
      </a>
    </div>

    <!-- actionsはホームもプロフィールも同じ表示 -->
    <div class="feed-actions">
      <form th:action="@{/posts/{id}/like(id=${p.id})}" method="post" style="display:inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="action" title="いいね"
                style="background:none;border:none;padding:0;cursor:pointer;">
          <span class="like-icon"
                th:text="${likedPostIds != null and likedPostIds.contains(p.id)} ? '♥' : '♡'">♡</span>
          <span class="count"
                th:text="${likeCountMap != null and likeCountMap.containsKey(p.id) ? likeCountMap.get(p.id) : 0}">0</span>
        </button>
      </form>

      <a class="action"
   th:href="@{/posts/{id}(id=${p.id})}"
   title="コメント">
  <span class="count">💬</span>
  <span class="count"
        th:text="${commentCountMap != null and commentCountMap.containsKey(p.id) ? commentCountMap.get(p.id) : 0}">
    0
  </span>
</a>

      <button type="button" class="action"
              th:attr="data-share-url=@{/posts/{id}(id=${p.id})}, data-share-title=${p.movieTitle}"
              onclick="sharePost(this)"
              style="background:none;border:none;padding:0;cursor:pointer;">
        <span class="count">↗ シェア</span>
      </button>
    </div>

  </div>
</div>
