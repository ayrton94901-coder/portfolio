<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<link rel="stylesheet" th:href="@{/app.css}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>投稿編集</title>

<link rel="stylesheet" th:href="@{/app.css}">
  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
	<div th:replace="~{fragments/header :: appHeader(${null})}"></div>
  <div class="container py-3">
    <h1 class="h3 mb-3">投稿編集</h1>

    <div class="mb-3">
      <img class="img-fluid rounded"
           th:src="@{'/uploads/' + ${post.imageFilename}}"
           alt="image">
    </div>

    <form th:action="@{/posts/{id}/update(id=${post.id})}"
          th:object="${postForm}"
          method="post"
          enctype="multipart/form-data">

      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <div class="mb-3">
        <label class="form-label">キャプション</label>
        <input class="form-control" type="text" th:field="*{caption}">
        <div class="text-danger small mt-1"
             th:if="${#fields.hasErrors('caption')}"
             th:errors="*{caption}"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">画像（変更する場合だけ選択）</label>
        <input class="form-control" type="file" th:field="*{image}">
      </div>

      <button class="btn btn-primary" type="submit">更新</button>
      <a class="btn btn-link" th:href="@{/posts/{id}(id=${post.id})}">詳細へ戻る</a>
    </form>
  </div>
</body>
</html>
