<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新規投稿</title>

  <link rel="stylesheet" th:href="@{/app.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div th:replace="~{fragments/header :: appHeader(${null})}"></div>

  <div class="container py-3" style="max-width: 760px;">
    <h1 class="h3 mb-3">新規投稿</h1>

    <form th:action="@{/posts}" th:object="${postForm}" method="post" enctype="multipart/form-data">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <!-- 映画タイトル -->
      <div class="mb-3">
        <label class="form-label">映画タイトル</label>
        <input class="form-control" type="text" th:field="*{movieTitle}" placeholder="例：インセプション">
        <div class="text-danger small mt-1"
             th:if="${#fields.hasErrors('movieTitle')}"
             th:errors="*{movieTitle}"></div>
      </div>

      <!-- 監督 -->
      <div class="mb-3">
        <label class="form-label">監督</label>
        <input class="form-control" type="text" th:field="*{director}" placeholder="例：クリストファー・ノーラン">
        <div class="text-danger small mt-1"
             th:if="${#fields.hasErrors('director')}"
             th:errors="*{director}"></div>
      </div>

      <div class="row g-3">
        <!-- 公開年 -->
        <div class="col-6">
          <label class="form-label">公開年</label>
          <input class="form-control" type="number" th:field="*{releaseYear}" placeholder="例：2010">
          <div class="text-danger small mt-1"
               th:if="${#fields.hasErrors('releaseYear')}"
               th:errors="*{releaseYear}"></div>
        </div>

        <!-- 評価 -->
        <div class="col-6">
          <label class="form-label">評価</label>
          <select class="form-select" th:field="*{rating}">
            <option value="" selected>選択してください</option>
            <option th:value="1">★ 1</option>
            <option th:value="2">★ 2</option>
            <option th:value="3">★ 3</option>
            <option th:value="4">★ 4</option>
            <option th:value="5">★ 5</option>
          </select>
          <div class="text-danger small mt-1"
               th:if="${#fields.hasErrors('rating')}"
               th:errors="*{rating}"></div>
        </div>
      </div>

      <!-- 感想 -->
      <div class="mb-3 mt-3">
        <label class="form-label">感想</label>
        <textarea class="form-control"
                  th:field="*{caption}"
                  rows="5"
                  placeholder="映画の感想を書こう"></textarea>
        <div class="text-danger small mt-1"
             th:if="${#fields.hasErrors('caption')}"
             th:errors="*{caption}"></div>
      </div>

      <!-- タグ（複数） -->
      <div class="mb-3">
        <label class="form-label">タグ（カンマ区切りで複数）</label>
        <input class="form-control" type="text" th:field="*{tags}" placeholder="例：SF, アクション, 名作, おすすめ">
        <div class="form-text">#は付けても付けなくてもOK（保存時に外します）</div>
        <div class="text-danger small mt-1"
             th:if="${#fields.hasErrors('tags')}"
             th:errors="*{tags}"></div>
      </div>

      <!-- 画像 -->
      <div class="mb-3">
        <label class="form-label">画像</label>
        <input class="form-control" type="file" th:field="*{image}">
        <div class="text-danger small mt-1"
             th:if="${#fields.hasErrors('image')}"
             th:errors="*{image}"></div>
      </div>

      <button class="btn btn-primary" type="submit">投稿</button>
      <a class="btn btn-link" th:href="@{/posts}">一覧へ戻る</a>
    </form>
  </div>
</body>
</html>
