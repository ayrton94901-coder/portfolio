<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>プロフィール</title>

	<!-- Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- 自作CSS -->
	<link rel="stylesheet" th:href="@{/app.css}">
</head>

<body>
	<!-- 共通ヘッダー（検索欄なし） -->
	<div th:replace="~{fragments/header :: appHeader(${null})}"></div>

	<main class="container app-container py-4">
		<a class="text-decoration-none" th:href="@{/posts}">← 戻る</a>

		<!-- プロフィールカード -->
		<div class="feed-card mt-3">
			<!-- カバー -->
			<div style="height: 140px; background: linear-gradient(90deg, #2f7cf6, #8b2cf5);"></div>

			<div class="p-4">
				<!-- アバター（仮） -->
				<div style="margin-top:-72px;">
					<div class="bg-white rounded-circle p-1 d-inline-block shadow-sm">
						<img th:src="${user.avatarFilename != null}
              ? @{'/uploads/' + ${user.avatarFilename}}
              : @{/default-avatar.png}" alt="avatar"
							style="width:120px;height:120px;border-radius:999px;object-fit:cover;">

					</div>
				</div>

				<h1 class="h3 mt-3 mb-1" th:text="${user.displayName}">user</h1>
				<div class="mb-2">
					<span class="badge text-bg-primary" th:if="${isMe}">あなたのプロフィール</span>
					<span class="badge text-bg-secondary" th:if="${!isMe}">ユーザープロフィール</span>
				</div>
				<div class="mb-3" th:if="${isMe}">
					<a class="btn btn-sm btn-outline-primary" th:href="@{/profile/edit}">プロフィール編集</a>
				</div>
				<div class="mb-3" th:if="${!isMe}">
					<!-- 未フォロー -->
					<form th:if="${!isFollowing}" th:action="@{/users/{id}/follow(id=${user.id})}" method="post"
						class="d-inline">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
						<button type="submit" class="btn btn-sm btn-primary">フォロー</button>
					</form>

					<!-- フォロー済み -->
					<form th:if="${isFollowing}" th:action="@{/users/{id}/unfollow(id=${user.id})}" method="post"
						class="d-inline">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
						<button type="submit" class="btn btn-sm btn-outline-secondary">フォロー解除</button>
					</form>
				</div>

				<div class="text-muted mb-3" th:text="'@' + ${user.handle}">@user</div>

				<div class="profile-bio">
					<p th:if="${user.bio != null and !#strings.isEmpty(user.bio)}" th:text="${user.bio}"
						style="white-space: pre-wrap;"></p>

					<p th:if="${user.bio == null or #strings.isEmpty(user.bio)}" style="color:#6b7280;">
						ここに自己紹介（後で追加できます）
					</p>
				</div>

				<hr class="my-2">

				<div class="d-flex gap-4">
					<div><span class="fw-bold" th:text="${#lists.size(myPosts)}">0</span> 投稿</div>
					<div><span class="fw-bold" th:text="${followerCount}">0</span> フォロワー</div>
					<div><span class="fw-bold" th:text="${followingCount}">0</span> フォロー中</div>
				</div>
			</div>
		</div>

		<h2 class="h5 mt-4 mb-3" th:text="${user.displayName + ' の投稿'}">投稿</h2>

		<section class="feed" th:if="${myPosts != null and !#lists.isEmpty(myPosts)}">
			<div th:each="p : ${myPosts}">
				<div th:insert="~{fragments/postCard :: postCard(p=${p}, showDate=${false})}"></div>
			</div>
		</section>

		<div th:if="${myPosts == null or #lists.isEmpty(myPosts)}" class="text-muted">
			まだ投稿がありません。
		</div>
	</main>
	<script>
		document.addEventListener('click', (e) => {
			if (e.target.closest('.feed-actions')) return;

			const link = e.target.closest('.card-link[data-href]');
			if (link) location.href = link.dataset.href;
		});

		async function sharePost(btn) {
			const url = new URL(btn.dataset.shareUrl, location.origin).toString();
			const title = btn.dataset.shareTitle || 'Cinema Link';
			try {
				if (navigator.share) {
					await navigator.share({title, url});
				} else {
					await navigator.clipboard.writeText(url);
					alert('リンクをコピーしました');
				}
			} catch (e) {
				console.log(e);
			}
		}
	</script>
</body>

</html>
